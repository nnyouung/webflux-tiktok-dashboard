<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok Live Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: #161622;
      border-bottom: 1px solid #2a2a3e;
    }
    header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fe2c55;
    }
    .header-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .connection-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #888;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }
    .dot.connected  { background: #25d366; box-shadow: 0 0 6px #25d366; }
    .dot.connecting { background: #ffc107; animation: pulse 1s infinite; }
    .dot.error      { background: #fe2c55; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .btn {
      padding: 7px 16px;
      border: none;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover  { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }
    .btn-mock       { background: #25d366; color: #000; }
    .btn-mock.active { background: #fe2c55; color: #fff; }

    /* ── Main layout ── */
    main {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left panel ── */
    .left-panel {
      background: #111118;
      border-right: 1px solid #2a2a3e;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .panel-title {
      padding: 18px 20px 12px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #555;
      border-bottom: 1px solid #1e1e2e;
    }

    .streamer-list {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .streamer-card {
      background: #1a1a28;
      border: 1px solid #2a2a3e;
      border-radius: 10px;
      padding: 14px 16px;
      transition: border-color 0.2s;
    }
    .streamer-card:hover { border-color: #444; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .streamer-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #ddd;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 180px;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }
    .live-badge.live {
      background: rgba(37, 211, 102, 0.12);
      color: #25d366;
      border: 1px solid rgba(37, 211, 102, 0.25);
    }
    .live-badge.offline {
      background: rgba(254, 44, 85, 0.08);
      color: #888;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .live-badge .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .live-badge.live    .badge-dot { background: #25d366; }
    .live-badge.offline .badge-dot { background: #555; }

    .card-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .card-stat {
      background: #0d0d18;
      border-radius: 7px;
      padding: 8px 10px;
      text-align: center;
    }
    .card-stat .label {
      font-size: 0.62rem;
      color: #555;
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .card-stat .value {
      font-size: 0.95rem;
      font-weight: 700;
      color: #ccc;
    }

    /* ── Right panel ── */
    .right-panel {
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      background: #0d0d15;
    }
    .rankings-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 20px;
      flex: 1;
    }

    .ranking-section {
      background: #111118;
      border: 1px solid #2a2a3e;
      border-radius: 12px;
      overflow: hidden;
    }
    .ranking-header {
      padding: 14px 18px;
      background: #16162a;
      border-bottom: 1px solid #2a2a3e;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ranking-icon {
      font-size: 1.1rem;
    }
    .ranking-title {
      font-size: 0.82rem;
      font-weight: 700;
      color: #ccc;
      letter-spacing: 0.04em;
    }

    .ranking-list {
      padding: 8px 0;
    }
    .ranking-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid #1a1a28;
      transition: background 0.15s;
    }
    .ranking-item:last-child { border-bottom: none; }
    .ranking-item:hover { background: #1a1a28; }

    .rank-number {
      font-size: 0.78rem;
      font-weight: 800;
      min-width: 24px;
      text-align: center;
      color: #555;
    }
    .rank-number.gold   { color: #ffd700; }
    .rank-number.silver { color: #c0c0c0; }
    .rank-number.bronze { color: #cd7f32; }

    .rank-bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .rank-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: #ccc;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .rank-bar-bg {
      height: 4px;
      background: #2a2a3e;
      border-radius: 2px;
      overflow: hidden;
    }
    .rank-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }
    .likes-bar    { background: linear-gradient(90deg, #fe2c55, #ff6b8a); }
    .comments-bar { background: linear-gradient(90deg, #25a0e3, #5ec8ff); }
    .viewers-bar  { background: linear-gradient(90deg, #7c3aed, #a78bfa); }

    .rank-value {
      font-size: 0.85rem;
      font-weight: 700;
      color: #aaa;
      min-width: 60px;
      text-align: right;
    }

    /* ── Event log (bottom strip) ── */
    .event-log {
      background: #0a0a12;
      border-top: 1px solid #1e1e2e;
      padding: 8px 20px;
      min-height: 34px;
      overflow: hidden;
    }
    .event-log-inner {
      display: flex;
      gap: 16px;
      font-size: 0.73rem;
      color: #444;
      white-space: nowrap;
      overflow: hidden;
    }
    .log-entry {
      animation: fadeInLog 0.3s ease;
    }
    .log-entry .log-time   { color: #333; }
    .log-entry .log-type   { font-weight: 700; }
    .log-entry .log-type.like    { color: #fe2c55; }
    .log-entry .log-type.chat    { color: #25a0e3; }
    .log-entry .log-type.member  { color: #7c3aed; }
    .log-entry .log-type.roomInfo { color: #ffc107; }
    .log-entry .log-type.snapshot { color: #25d366; }
    .log-entry .log-type.gift    { color: #ff8c00; }
    .mock-tag {
      font-size: 0.63rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(255, 200, 0, 0.12);
      color: #ffc800;
      border: 1px solid rgba(255, 200, 0, 0.25);
      letter-spacing: 0.05em;
    }
    .real-tag {
      font-size: 0.63rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(37, 211, 102, 0.1);
      color: #25d366;
      border: 1px solid rgba(37, 211, 102, 0.25);
      letter-spacing: 0.05em;
    }
    .streamer-card.has-real { border-color: rgba(37, 211, 102, 0.3); }

    @keyframes fadeInLog {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <h1>TikTok Live Dashboard</h1>
  <div class="header-controls">
    <div class="connection-badge">
      <div class="dot connecting" id="conn-dot"></div>
      <span id="conn-text">연결 중...</span>
    </div>
    <button class="btn btn-mock" id="mock-btn" onclick="toggleMock()">Mock 시작</button>
  </div>
</header>

<main>
  <!-- Left: Streamer list -->
  <div class="left-panel">
    <div class="panel-title">스트리머 목록</div>
    <div class="streamer-list" id="streamer-list"></div>
  </div>

  <!-- Right: Rankings -->
  <div class="right-panel">
    <div class="rankings-grid">
      <div class="ranking-section">
        <div class="ranking-header">
          <span class="ranking-icon">❤️</span>
          <span class="ranking-title">좋아요 랭킹</span>
        </div>
        <div class="ranking-list" id="ranking-likes"></div>
      </div>
      <div class="ranking-section">
        <div class="ranking-header">
          <span class="ranking-icon">💬</span>
          <span class="ranking-title">댓글 랭킹</span>
        </div>
        <div class="ranking-list" id="ranking-comments"></div>
      </div>
      <div class="ranking-section">
        <div class="ranking-header">
          <span class="ranking-icon">👥</span>
          <span class="ranking-title">시청자 랭킹</span>
        </div>
        <div class="ranking-list" id="ranking-viewers"></div>
      </div>
    </div>
  </div>
</main>

<div class="event-log">
  <div class="event-log-inner" id="event-log"></div>
</div>

<script>
  // 콘솔 로그는 기본 OFF. 필요하면 URL에 ?debug=1 을 붙여서 켜기.
  const DEBUG = new URLSearchParams(location.search).has('debug');
  // ── 설정 ──────────────────────────────────────────────────────────────────
  // 실제 TikTok 계정으로 교체하거나, Mock 버튼으로 테스트 가능
  const STREAMERS = [
    '',
    '',
    '',
    '',
    '',
  ];

  // ── 상태 ──────────────────────────────────────────────────────────────────
  const stats = {};
  STREAMERS.forEach(id => {
    stats[id] = { likes: 0, comments: 0, viewers: 0, live: false, hasReal: false };
  });

  let mockTimer = null;
  let eventSource = null;
  const LOG_MAX = 6;
  let logEntries = [];

  // ── 유틸 ──────────────────────────────────────────────────────────────────
  function fmt(n) {
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
    if (n >= 1_000)     return (n / 1_000).toFixed(1) + 'K';
    return String(n);
  }

  function nowStr() {
    const d = new Date();
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
  }

  function rankClass(i) {
    if (i === 0) return 'gold';
    if (i === 1) return 'silver';
    if (i === 2) return 'bronze';
    return '';
  }

  // ── 스트리머 등록 ──────────────────────────────────────────────────────────
  async function registerAll() {
    for (const id of STREAMERS) {
      try {
        await fetch(`/manager/register/${id}`, { method: 'POST' });
      } catch (_) { /* 이미 등록됐거나 서버 오류는 무시 */ }
    }
  }

  // ── SSE 연결 ───────────────────────────────────────────────────────────────
  function connectSSE() {
    setConnStatus('connecting');

    if (eventSource) {
      eventSource.close();
    }

    eventSource = new EventSource('/manager/stream');

    eventSource.onopen = () => {
      setConnStatus('connected');
    };

    eventSource.onmessage = (e) => {
      let event;
      try {
        event = JSON.parse(e.data);
      } catch (_) {
        return; // JSON 파싱 실패만 무시
      }
      handleEvent(event); // renderAll 에러가 있으면 콘솔에 노출
    };

    eventSource.onerror = () => {
      setConnStatus('error');
      eventSource.close();
      setTimeout(connectSSE, 3000);
    };
  }

  function setConnStatus(status) {
    const dot  = document.getElementById('conn-dot');
    const text = document.getElementById('conn-text');
    dot.className = 'dot ' + status;
    const labels = { connecting: '연결 중...', connected: '연결됨', error: '재연결 중...' };
    text.textContent = labels[status] || status;
  }

  // ── 이벤트 처리 ────────────────────────────────────────────────────────────
  function handleEvent(event) {
    const { type, uniqueId } = event;
    const s = stats[uniqueId];
    if (!s) {
      console.warn('[SKIP] 등록되지 않은 uniqueId:', uniqueId, event);
      return;
    }

    if (DEBUG) {
      console.log('[EVENT]', type, uniqueId, 'likeCount:', event.likeCount, 'viewerCount:', event.viewerCount, 'comment:', event.comment);
    }

    if (!event.mock && type !== 'snapshot') s.hasReal = true;

    switch (type) {
      case 'snapshot':
        s.viewers = event.viewerCount || 0;
        s.live    = !!event.live;
        break;
      case 'like':
        s.likes += (event.likeCount || 0);
        s.live = true;
        break;
      case 'chat':
        s.comments += 1;
        s.live = true;
        break;
      case 'member':
        s.viewers = event.viewerCount || 0;
        s.live = true;
        break;
      case 'roomInfo':
        s.viewers = event.viewerCount || 0;
        s.live = true;
        break;
    }

    if (DEBUG) {
      console.log('[STATS]', uniqueId, JSON.stringify(stats[uniqueId]));
    }
    renderAll();
    addLog(event);
  }

  // ── 렌더링 ─────────────────────────────────────────────────────────────────
  function renderAll() {
    renderStreamerList();
    renderRankings();
  }

  function renderStreamerList() {
    const list = document.getElementById('streamer-list');
    list.innerHTML = STREAMERS.map(id => {
      const s = stats[id];
      const liveClass = s.live ? 'live' : 'offline';
      const liveLabel = s.live ? 'LIVE' : 'OFFLINE';
      const sourceTag = s.hasReal
        ? `<span class="real-tag">REAL</span>`
        : `<span class="mock-tag">MOCK</span>`;
      return `
        <div class="streamer-card${s.hasReal ? ' has-real' : ''}">
          <div class="card-header">
            <span class="streamer-name" title="${id}">${id}</span>
            <div style="display:flex;gap:5px;align-items:center">
              ${sourceTag}
              <span class="live-badge ${liveClass}">
                <span class="badge-dot"></span>${liveLabel}
              </span>
            </div>
          </div>
          <div class="card-stats">
            <div class="card-stat">
              <div class="label">시청자</div>
              <div class="value">${fmt(s.viewers)}</div>
            </div>
            <div class="card-stat">
              <div class="label">좋아요</div>
              <div class="value">${fmt(s.likes)}</div>
            </div>
            <div class="card-stat">
              <div class="label">댓글</div>
              <div class="value">${fmt(s.comments)}</div>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function renderRankings() {
    renderRanking('ranking-likes',    'likes',    'likes-bar');
    renderRanking('ranking-comments', 'comments', 'comments-bar');
    renderRanking('ranking-viewers',  'viewers',  'viewers-bar');
  }

  function renderRanking(containerId, statKey, barClass) {
    const sorted = [...STREAMERS].sort((a, b) => stats[b][statKey] - stats[a][statKey]);
    const maxVal = stats[sorted[0]][statKey] || 1;
    const el = document.getElementById(containerId);
    el.innerHTML = sorted.map((id, i) => {
      const val = stats[id][statKey];
      const pct = Math.max(4, Math.round((val / maxVal) * 100));
      return `
        <div class="ranking-item">
          <span class="rank-number ${rankClass(i)}">${i + 1}</span>
          <div class="rank-bar-wrap">
            <span class="rank-name" title="${id}">${id}</span>
            <div class="rank-bar-bg">
              <div class="rank-bar-fill ${barClass}" style="width:${pct}%"></div>
            </div>
          </div>
          <span class="rank-value">${fmt(val)}</span>
        </div>`;
    }).join('');
  }

  // ── 이벤트 로그 ────────────────────────────────────────────────────────────
  function addLog(event) {
    const { type, uniqueId } = event;
    if (type === 'snapshot') return; // 스냅샷은 로그 생략

    let detail = '';
    if (type === 'like')    detail = `+${event.likeCount} likes`;
    else if (type === 'chat')    detail = `"${(event.comment || '').substring(0, 20)}"`;
    else if (type === 'member')  detail = `${fmt(event.viewerCount)} viewers`;
    else if (type === 'roomInfo') detail = `${fmt(event.viewerCount)} viewers`;
    else if (type === 'gift')    detail = `${event.giftName} x${event.giftCount}`;

    logEntries.unshift({ time: nowStr(), type, uniqueId, detail, mock: !!event.mock });
    if (logEntries.length > LOG_MAX) logEntries.length = LOG_MAX;

    document.getElementById('event-log').innerHTML = logEntries.map(e =>
      `<span class="log-entry">
        <span class="log-time">[${e.time}]</span>
        ${e.mock ? '<span class="mock-tag">MOCK</span>' : '<span class="real-tag">REAL</span>'}
        <span class="log-type ${e.type}">${e.type}</span>
        <span>${e.uniqueId}</span>
        <span>${e.detail}</span>
      </span>`
    ).join('');
  }

  // ── Mock 토글 ─────────────────────────────────────────────────────────────
  function toggleMock() {
    const btn = document.getElementById('mock-btn');
    if (mockTimer) {
      clearInterval(mockTimer);
      mockTimer = null;
      btn.textContent = 'Mock 시작';
      btn.classList.remove('active');
    } else {
      btn.textContent = 'Mock 중지';
      btn.classList.add('active');
      mockTimer = setInterval(() => {
        const id = STREAMERS[Math.floor(Math.random() * STREAMERS.length)];
        fetch(`/dev/mock?uniqueId=${encodeURIComponent(id)}`).catch(() => {});
      }, 1000);
    }
  }

  // ── 초기화 ────────────────────────────────────────────────────────────────
  (async function init() {
    renderAll(); // 빈 상태로 초기 렌더
    await registerAll();
    connectSSE();
  })();
</script>
</body>
</html>
